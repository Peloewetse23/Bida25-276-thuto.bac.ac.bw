<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Booking | Kalahari Audi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f8f9fa; }
        .booking-card {
            border: none;
            border-top: 5px solid #e00000; /* Audi Red Accent */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-audi {
            background-color: #000;
            color: white;
            border-radius: 0;
            font-weight: bold;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-audi:hover {
            background-color: #e00000;
            color: white;
        }
    </style>
</head>
<body>

    <div class="bg-dark text-white py-4 mb-5">
        <div class="container">
            <h1 class="fw-bold m-0">KALAHARI <span style="color: #e00000;">AUDI</span></h1>
            <p class="small text-uppercase tracking-widest mb-0">Botswana Workshop Booking</p>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card booking-card p-4">
                    <h2 class="h4 mb-4 fw-bold">Service Appointment</h2>
                    
                    <form action="index.html" method="GET">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control rounded-0" placeholder="Enter names" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Vehicle Model</label>
                            <input type="text" class="form-control rounded-0" placeholder="e.g. Audi RS7 Sportback" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Maintenance Type</label>
                            <select class="form-select rounded-0" required>
                                <option value="">-- Select Service --</option>
                                <option>Oil & Filter Change</option>
                                <option>Brake Service</option>
                                <option>Diagnostic Check</option>
                                <option>Tire Alignment</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Preferred Date</label>
                            <input type="date" class="form-control rounded-0" required>
                        </div>

                        <button type="submit" class="btn btn-audi w-100">CONFIRM BOOKING</button>
                    </form>
                </div>
                
                <div class="text-center mt-4">
                    <a href="service.html" class="text-dark text-decoration-none small">&larr; Back to Services</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">&copy; 2026 Kalahari Audi Showroom. Gaborone, Botswana.</p>
    </footer>

</body>
</html>
