<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Details | Kalahari Audi Botswana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">KALAHARI AUDI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="showroom.html">Showroom</a></li>
                    <li class="nav-item"><a class="nav-link" href="service.html">Audi Service</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5" id="car-details-container">
        <div class="text-center py-5">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Kalahari Audi Showroom. Gaborone, Botswana.</p>
        </div>
    </footer>

    <script>
    
        const cars = [
             
            { id: 1, model: "Audi RS Q8", year: 2026, price: "P2,550,000", type: "New", body: "SUV", engine: "4.0L V8", img: "img/rsq8.jpg" },
            { id: 2, model: "Audi Q5", year: 2026, price: "P1,100,000", type: "New", body: "SUV", engine: "2.0L TFSI", img: "img/q5.jpg" },
            { id: 3, model: "Audi RS5 Coupé", year: 2026, price: "P1,850,000", type: "New", body: "Coupé", engine: "2.9L V6", img: "img/rs5.webp" },
            { id: 4, model: "Audi TT RS", year: 2026, price: "P1,400,000", type: "New", body: "Coupé", engine: "2.5L 5-Cyl", img: "img/ttrs.webp" },
            { id: 5, model: "Audi RS7 Sportback", year: 2026, price: "P2,150,000", type: "New", body: "Sportback", engine: "4.0L V8", img: "img/rs7.jpg" },
            { id: 6, model: "Audi A5 Sportback", year: 2026, price: "P950,000", type: "New", body: "Sportback", engine: "2.0L TFSI", img: "img/A5_sportback.jpg" },
            { id: 7, model: "Audi RS3 Sportback", year: 2026, price: "P1,250,000", type: "New", body: "Hatchback", engine: "2.5L TFSI", img: "img/rs3.jpg" },
            { id: 8, model: "Audi A1 Sportback", year: 2026, price: "P550,000", type: "New", body: "Hatchback", engine: "1.0L TFSI", img: "img/a1.jpg" },
            
            { id: 9, model: "Audi A3 Hatchback", year: 2020, price: "P295,000", type: "Pre-Owned", body: "Hatchback", engine: "1.4L TFSI", img: "img/used_a3.jpg" },
            { id: 10, model: "Audi Q3 Quattro", year: 2018, price: "P380,000", type: "Pre-Owned", body: "SUV", engine: "2.0L", img: "img/used_q3.jpg" },
            { id: 11, model: "Audi A5 Coupé", year: 2019, price: "P420,000", type: "Pre-Owned", body: "Coupé", engine: "2.0L TFSI", img: "img/used_a5.jpg" },
            { id: 12, model: "Audi Q7 V6", year: 2017, price: "P490,000", type: "Pre-Owned", body: "SUV", engine: "3.0L TDI", img: "img/used_q7.jpg" },
            { id: 13, model: "Audi Q3 ", year: 2017, price: "P430,000", type: "Pre-Owned", body: "SUV", engine: "2.0L ", img: "img/used_q3.jpg" },
            { id: 14, model: "Audi A5 ", year: 2019, price: "P250,000", type: "Pre-Owned", body: "Coupé", engine: "2.0L ", img: "img/used_a5.jpg" },
            { id: 15, model: "Audi SQ5 ", year: 2026, price: "P910,000", type: "New", body: "SUV", engine: "3.0L V6 ", img: "img/sq5.jpeg" },
            { id: 16, model: "Audi E-Tron", year: 2026, price: "P550,000", type: "New", body: "Sportback", engine: "Electric", img: "img/E-tron.jpg" },
            { id: 14, model: "Audi A5 S line ", year: 2019, price: "P450,000", type: "New", body: "Sportback", engine: "2.0L Turbo charged ", img: "img/used_A5 S line.jpg" },
            { id: 15, model: "Audi Q8", year: 2024, price: "P2,100,000", type: "New", body: "SUV", engine: "4.0L V6", img: "img/q8.jpg" },
            { id: 16, model: "Audi Q7", year: 2024, price: "P1,100,000", type: "New", body: "SUV", engine: "4.0L V6", img: "img/q7.jpg" },
        

            
        ]

        const urlParams = new URLSearchParams(window.location.search);
        const carId = parseInt(urlParams.get('id'));

        const selectedCar = cars.find(car => car.id === carId);

        const container = document.getElementById('car-details-container');

        if (selectedCar) {
            container.innerHTML = `
                <div class="row align-items-center g-5">
                    <div class="col-lg-7">
                        <img src="${selectedCar.img}" 
                             alt="${selectedCar.year} ${selectedCar.model} specifications" 
                             width="800" 
                             height="500" 
                             class="img-fluid rounded shadow-lg"
                             style="object-fit: cover;">
                    </div>

                    <div class="col-lg-5">
                        <span class="badge ${selectedCar.type === 'New' ? 'bg-danger' : 'bg-secondary'} mb-2 p-2 fs-6">${selectedCar.type}</span>
                        <h1 class="display-5 fw-bold mb-3">${selectedCar.model}</h1>
                        <h2 class="text-primary fw-bold mb-4">${selectedCar.price}</h2>
                        
                        <p class="text-muted mb-4">Experience premium German engineering tailored for the Botswana roads. This ${selectedCar.year} model offers unparalleled luxury and performance.</p>
                        
                        <div class="row g-3 mb-5 border-top border-bottom py-3">
                            <div class="col-6">
                                <h6 class="text-muted mb-0">Year</h6>
                                <p class="fw-bold mb-0">${selectedCar.year}</p>
                            </div>
                            <div class="col-6">
                                <h6 class="text-muted mb-0">Body Style</h6>
                                <p class="fw-bold mb-0">${selectedCar.body}</p>
                            </div>
                            <div class="col-6">
                                <h6 class="text-muted mb-0">Engine</h6>
                                <p class="fw-bold mb-0">${selectedCar.engine}</p>
                            </div>
                            <div class="col-6">
                                <h6 class="text-muted mb-0">Location</h6>
                                <p class="fw-bold mb-0">Gaborone Showroom</p>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <a href="contact.html?interest=${encodeURIComponent(selectedCar.model)}" class="btn btn-danger btn-lg rounded-3 fw-bold py-3">BOOK TEST DRIVE</a>
                            <a href="showroom.html" class="btn btn-outline-dark btn-lg rounded-3 fw-bold py-3">BACK TO SHOWROOM</a>
                        </div>
                    </div>
                </div>
            `;
        } else {
        
            container.innerHTML = `
                <div class="text-center py-5">
                    <h2 class="display-4 fw-bold">Vehicle Not Found</h2>
                    <p class="lead">Sorry, we couldn't find the details for this vehicle.</p>
                    <a href="showroom.html" class="btn btn-dark mt-3">Return to Showroom</a>
                </div>
            `;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
